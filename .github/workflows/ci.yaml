# This workflow is run on every pull requests on dev and main.
# It aims to check the format, the style, the build and the tests of the code.
name: Continuous Integration

run-name: Pull request from ${{ github.head_ref }} to ${{ github.base_ref }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, dev]

jobs:
  ci:
    name: CI (${{ matrix.os }} - ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]

        include:
          - os: ubuntu-latest
            setup_script: ./scripts/linux/setup-env.sh
            build_script: ./scripts/linux/build.sh
            format_script: ./scripts/linux/format.sh
            lint_script: ./scripts/linux/lint.sh
            test_script: ./scripts/linux/test.sh
            shell: bash

          - os: windows-latest
            setup_script: call .\scripts\windows\setup-env.bat
            build_script: call .\scripts\windows\build.bat
            format_script: call .\scripts\windows\format.bat
            lint_script: call .\scripts\windows\lint.bat
            test_script: call .\scripts\windows\test.bat
            shell: cmd

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: ${{ matrix.setup_script }}

      - name: Check CPM cache before restore
        run: |
          echo "=== CPM cache status BEFORE restore ==="
          if [ -d .cache/CPM ]; then du -sh .cache/CPM 2>/dev/null || echo "Cache exists but cannot measure size"; else echo "No cache directory yet"; fi
        shell: bash
        if: matrix.os == 'ubuntu-latest'

      - name: Check CPM cache before restore (Windows)
        run: |
          echo === CPM cache status BEFORE restore ===
          if exist .cache\CPM (dir .cache\CPM /s) else (echo No cache directory yet)
        shell: cmd
        if: matrix.os == 'windows-latest'

      - name: Restore dependencies cache
        id: cache-cpm
        uses: actions/cache@v4
        with:
          path: .cache/CPM
          key: ${{ runner.os }}-cpm-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-cpm-

      - name: Cache hit result
        run: echo "Cache hit = ${{ steps.cache-cpm.outputs.cache-hit }}"
        shell: bash

      - name: Check CPM cache after restore
        run: |
          echo "=== CPM cache status AFTER restore ==="
          if [ -d .cache/CPM ]; then du -sh .cache/CPM 2>/dev/null || echo "Cache exists but cannot measure size"; else echo "No cache directory yet"; fi
        shell: bash
        if: matrix.os == 'ubuntu-latest'

      - name: Check CPM cache after restore (Windows)
        run: |
          echo === CPM cache status AFTER restore ===
          if exist .cache\CPM (dir .cache\CPM /s) else (echo No cache directory yet)
        shell: cmd
        if: matrix.os == 'windows-latest'

      - name: Build
        run: ${{ matrix.build_script }} ${{ matrix.build_type }}

      - name: Format check
        run: ${{ matrix.format_script }}

      - name: Lint check
        run: ${{ matrix.lint_script }} ${{ matrix.build_type }}

      - name: Run tests
        run: ${{ matrix.test_script }} ${{ matrix.build_type }}
