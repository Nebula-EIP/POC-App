# This workflow is run on every pull requests on dev and main.
# It aims to check the format, the style, the build and the tests of the code.
name: Continuous Integration

run-name: Pull request from ${{ github.head_ref }} to ${{ github.base_ref }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, dev]

jobs:
  ci:
    name: CI (${{ matrix.os }} - ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]

        include:
          - os: ubuntu-latest
            setup_script: ./scripts/linux/setup-env.sh
            build_script: ./scripts/linux/build.sh
            format_script: ./scripts/linux/format.sh
            lint_script: ./scripts/linux/lint.sh
            test_script: ./scripts/linux/test.sh
            shell: bash

          - os: windows-latest
            setup_script: ./scripts/windows/setup-env.bat
            build_script: ./scripts/windows/build.bat
            format_script: ./scripts/windows/format.bat
            lint_script: ./scripts/windows/lint.bat
            test_script: ./scripts/windows/test.bat
            shell: cmd

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: ${{ matrix.setup_script }}

      # - name: Restore dependancies cache
      #   uses: actions/cache@v4
      #   with:
      #     path: .cache/CPM
      #     key: ${{ runner.os }}-cpm-${{ hashFiles('**/CMakeLists.txt') }}
      #     restore-keys: ${{ runner.os }}-cpm-

      # - name: Restore build cache
      #   uses: actions/cache@v4
      #   with:
      #     path: build
      #     key: ${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt','src/**/*','tests/**/*') }}
      #     restore-keys: ${{ runner.os }}-${{ matrix.build_type }}-

      - name: Build
        run: ${{ matrix.build_script }} ${{ matrix.build_type }}

      - name: Verify C++ standard from compile_commands (Linux)
        if: runner.os == 'Linux'
        run: |
          python3 - <<'PY'
          import json, re, sys
          with open("build/compile_commands.json", "r", encoding="utf-8") as f:
              db = json.load(f)

          bad = []
          for e in db:
              cmd = e.get("command", "")
              if not cmd and "arguments" in e:
                  cmd = " ".join(e["arguments"])
              m = re.search(r'-std=([^\s"]+)', cmd)
              std = m.group(1) if m else "<none>"

              if e.get("file", "").endswith("src/core/graph.cpp"):
                  print(f"graph.cpp std flag: {std}")

              if m is None or all(x not in std for x in ("c++23", "gnu++23", "c++2b", "gnu++2b")):
                  bad.append((e.get("file", "?"), std))

          print(f"compile_commands entries: {len(db)}")
          print(f"non C++23-like entries: {len(bad)}")
          if bad:
              print("example non-conforming entry:", bad[0])
              sys.exit(1)
          PY

      - name: Format check
        run: ${{ matrix.format_script }}

      - name: Lint check
        run: ${{ matrix.lint_script }}

      - name: Run tests
        run: ${{ matrix.test_script }} ${{ matrix.build_type }}
