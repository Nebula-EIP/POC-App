# This workflow is run on every push on main.
# It aims to mirror the repository to the official one.
name: Mirror to official repository

run-name: Mirror to official repository

on:
  push:
    branches: [main]

env:
  MIRROR_URL: 'git@github.com:EpitechPGE3-2025/G-EIP-600-NAN-6-1-eip-8.git'

jobs:
  push_to_mirror:
    runs-on: ubuntu-latest
    if: github.repository != 'EpitechPGE3-2025/G-EIP-600-NAN-6-1-eip-8'
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Mirroring"
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            ${{ env.MIRROR_URL }}
          ssh_private_key:
            ${{ secrets.GIT_SSH_PRIVATE_KEY }}
