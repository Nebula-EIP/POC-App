# This workflow builds and deploys the Nebula documentation site.
# - On pull requests: builds docs and publishes a preview under /previews/pr-<number>/.
# - On push to main: publishes the production docs at the root of GitHub Pages.
name: Documentation

run-name: >-
  ${{
    github.event_name == 'pull_request' && github.event.action == 'closed'
      && 'Clean preview'
      || github.event_name == 'pull_request'
      && 'Check build & deploy preview'
      || 'Check build & deploy docs'
  }}

concurrency:
  group: docs-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main, dev]

jobs:
  build-docs:
    name: Build documentation
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    env:
      BASE_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && format('/POC-App/previews/pr-{0}/', github.event.number) || '/POC-App/' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate API documentation
        run: doxygen Doxyfile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run build

      - name: Upload built documentation
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/build
          if-no-files-found: error

  deploy-preview:
    name: Deploy PR preview
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build-docs
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Download built documentation
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: docs/build

      - name: Deploy PR preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build
          destination_dir: previews/pr-${{ github.event.number }}
          keep_files: true
          commit_message: "🚀 Deploy preview for pr-${{ github.event.number }} at"

      - name: Comment preview link on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            🚀 **Docs Preview Available**
            https://nebula-eip.github.io/POC-App/previews/pr-${{ github.event.number }}/

  deploy-production:
    name: Deploy production documentation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download built documentation
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: docs/build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build
          keep_files: true
          commit_message: "🚀 Deploy production docs from main at"

  cleanup-preview:
    name: Cleanup PR Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove preview directory
        run: |
          set -e
          PREVIEW_DIR="previews/pr-${{ github.event.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            rm -rf "$PREVIEW_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "🔥 Remove preview for pr-${{ github.event.number }}"
            git pull --rebase origin gh-pages
            git push origin gh-pages
          else
            echo "No preview directory found for pr-${{ github.event.number }}"
          fi
